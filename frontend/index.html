<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manutenção de Tablets e Rastreadores — Lenarge</title>
<link rel="stylesheet" href="css/theme.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- ===================== TELA DE LOGIN ===================== -->
<div id="login-screen" class="auth-screen hidden">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="assets/logo.png" alt="Lenarge" onerror="this.style.display='none'">
    </div>
    <h1>Manutenção de Tablets e Rastreadores</h1>
    <div id="login-msg"></div>
    <form id="login-form">
      <div class="field">
        <label>Usuário</label>
        <input type="text" id="login-usuario" autocomplete="username" required>
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="login-senha" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Entrar</button>
    </form>
    <div class="auth-footer">
      Não tem conta? <span class="btn-link" id="go-signup" style="cursor:pointer">Criar conta</span>
    </div>
  </div>
</div>

<!-- ===================== TELA DE CADASTRO ===================== -->
<div id="signup-screen" class="auth-screen hidden">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="assets/logo.png" alt="Lenarge" onerror="this.style.display='none'">
    </div>
    <h1>Criar conta de Solicitante</h1>
    <div id="signup-msg"></div>
    <form id="signup-form">
      <div class="field">
        <label>Nome completo</label>
        <input type="text" id="signup-nome" required>
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="signup-email" required>
      </div>
      <div class="field">
        <label>Telefone (com DDD)</label>
        <input type="text" id="signup-telefone" placeholder="(31) 91234-5678" required>
      </div>
      <div class="field">
        <label>Usuário</label>
        <input type="text" id="signup-usuario" required>
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="signup-senha" required>
      </div>
      <div class="field">
        <label>Confirmar senha</label>
        <input type="password" id="signup-confirmar" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Criar conta</button>
    </form>
    <div class="auth-footer">
      Já tem conta? <span class="btn-link" id="go-login" style="cursor:pointer">Entrar</span>
    </div>
  </div>
</div>

<!-- ===================== APP PRINCIPAL ===================== -->
<div id="app-shell" class="app-shell hidden">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="assets/logo.png" alt="Lenarge"
           onerror="this.style.display='none'; document.getElementById('logo-fallback-text').style.display='inline';">
      <span id="logo-fallback-text" class="logo-fallback">Lenarge</span>
    </div>

    <nav class="nav-list">
      <div class="nav-item" data-view="dashboard">📊 Dashboard</div>
      <div class="nav-item" data-view="nova">➕ Nova solicitação</div>
      <div class="nav-item" data-view="lista">📋 Pesquisar / Lista</div>
      <div class="nav-item" data-view="config" id="nav-config">⚙️ Configurações</div>
    </nav>

    <div class="sidebar-user">
      <div class="avatar" id="user-avatar">?</div>
      <div>
        <div class="sidebar-user-name" id="user-name">—</div>
        <div class="sidebar-user-role" id="user-role">—</div>
      </div>
      <div class="logout-link" id="logout-btn">Sair</div>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar"><h2 id="view-title">Dashboard</h2></div>
    <div class="view-content" id="view-content"></div>
  </div>
</div>

<div id="modal-root"></div>

<script src="js/api.js"></script>
<script src="js/enums.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/nova.js"></script>
<script src="js/lista.js"></script>
<script src="js/detalhe.js"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
